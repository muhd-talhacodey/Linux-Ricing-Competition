# ==========================================
# HYPRLOCK MINIMALIST CENTERED CONFIG
# Palette: Catppuccin Mocha + Frosted Glass
# ==========================================

background {
    monitor =
    path = /home/muhammadtalha/Pictures/Wallpapers/8888664.jpg

    # Clean Frosted Blur across the whole screen
    blur_passes = 3
    blur_size = 7
    noise = 0.012
    brightness = 0.75
    contrast = 0.9
}

# ------------------------------------------
# CENTERED TIME DISPLAY
# ------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgb(205, 214, 244)             # Catppuccin Mocha Text
    font_size = 64
    font_family = Sans Bold

    position = 0, 120                      # Elevated above the date
    halign = center
    valign = center
}

# ------------------------------------------
# CENTERED DATE DISPLAY
# ------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgb(180, 190, 254)             # Catppuccin Mocha Lavender
    font_size = 18
    font_family = Sans Medium

    position = 0, 50                       # Clean spacing below the time
    halign = center
    valign = center
}

# ------------------------------------------
# BEAUTIFIED SQUARE PASSWORD INPUT
# ------------------------------------------
input-field {
    monitor =
    size = 280, 46
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = true
    rounding = 0                            # Forces a clean square shape

    # Translucent theme-matched colors
    outer_color = rgba(180, 190, 254, 0.6)  # Translucent Lavender border
    inner_color = rgba(30, 30, 46, 0.45)    # Translucent Mocha Base
    font_color = rgb(205, 214, 244)         # Mocha Text

    # Validation States
    check_color = rgb(249, 226, 175)        # Mocha Yellow
    fail_color = rgb(243, 139, 168)         # Mocha Red

    fade_on_empty = false
    placeholder_text = <span font_weight="bold" foreground="##a6adc8">Enter password -____- </span>
    hide_input = false

    position = 0, -40                      # Spaced comfortably below the date
    halign = center
    valign = center
}
# ------------------------------------------
# CENTERED BATTERY STATUS (TEXT METHOD)
# ------------------------------------------
label {
    monitor =
    # Displays clean text followed by the system battery capacity
    text = cmd[update:5000] echo "BATTERY: $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba(205, 214, 244, 0.8)        # Translucent Catppuccin Mocha Text
    font_size = 14
    font_family = Sans Bold                 # Made it bold to match your ricing style

    position = 0, -110                     # Safely spaced below the password input
    halign = center
    valign = center
}

